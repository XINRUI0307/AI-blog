{% extends 'base.html' %}
{% block title %}New Post — Photo Blog{% endblock %}
{% block content %}

<div class="page-header">
  <h2>Create New Post</h2>
  {% if remaining is defined %}
  <p>You can publish <strong>{{ remaining }}</strong> more post{{ 's' if remaining != 1 }}.</p>
  {% endif %}
</div>

<div class="card">
  <div class="card-body" style="padding:2rem">
    <form method="post">
      <div class="mb-4">
        <label class="form-label">Title <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control form-control-lg"
               placeholder="Give your post a compelling title..." required maxlength="200"
               style="font-family:var(--font-serif);font-size:1.15rem">
      </div>
      <div class="mb-4">
        <label class="form-label">Description <span class="text-danger">*</span></label>
        <textarea name="description" class="form-control" rows="8"
                  placeholder="Tell the story behind your photos..." required></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label">
          <i class="bi bi-geo-alt me-1"></i>Location
          <span class="text-muted fw-normal">(optional)</span>
        </label>
        <input type="text" name="location" class="form-control"
               placeholder="e.g. Tokyo, Japan" maxlength="200">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check2 me-1"></i>Create Post
        </button>
        <a href="{{ url_for('posts.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
